version: '3.8'\n\nservices:\n  frontend:\n    image: frontend-image:latest\n    build:\n      context: ./frontend\n    volumes:\n      - ./frontend:/app\n    environment:\n      - NODE_ENV=production\n      - API_URL=http://backend:5000\n    ports:\n      - "3000:3000"\n\n  backend:\n    image: backend-image:latest\n    build:\n      context: ./backend\n    volumes:\n      - ./backend:/app\n    environment:\n      - NODE_ENV=production\n      - DATABASE_URL=postgres://user:password@db:5432/mydb\n      - SECRET_KEY=mysecretkey\n    ports:\n      - "5000:5000"\n\n  db:\n    image: postgres:latest\n    volumes:\n      - db_data:/var/lib/postgresql/data\n    environment:\n      - POSTGRES_USER=user\n      - POSTGRES_PASSWORD=password\n      - POSTGRES_DB=mydb\n\nvolumes:\n  db_data: